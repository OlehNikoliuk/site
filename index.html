<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Тато!</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent: #0984e3;
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--primary-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 40px;
        }

        .hero {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            padding: 60px 20px 40px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.2);
        }

        .hero h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .hero p {
            font-size: 16px;
            opacity: 0.9;
        }

        .photo-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin: -60px auto 20px;
            background-color: #dfe6e9;
            background-image: url('https://via.placeholder.com/120'); /* Встав посилання на фото тата сюди */
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .content {
            padding: 0 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .card p {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .card p:last-child {
            margin-bottom: 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            background-color: #dfe6e9;
            background-size: cover;
            background-position: center;
        }

        .button {
            display: block;
            width: 100%;
            padding: 16px;
            text-align: center;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: opacity 0.2s ease;
        }

        .button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="hero">
        <h1>З Днем Народження!</h1>
        <p>Найкращому татові</p>
    </div>

    <div class="photo-avatar"></div>

    <div class="content">
        <div class="card">
            <h2>Привіт з Польщі! 👋</h2>
            <p>Тату, вітаю тебе з днем народження! Дуже сильно сумую за тобою і чекаю нашої зустрічі.</p>
            <p>Бережи себе там. Ти — мій герой і найбільший приклад для мене. Дякую тобі за все, що ти робиш.</p>
        </div>

        <div class="card">
            <h2>Наші спогади</h2>
            <div class="gallery">
                <div class="gallery-item" style="background-image: url('https://via.placeholder.com/150');"></div>
                <div class="gallery-item" style="background-image: url('https://via.placeholder.com/150');"></div>
                <div class="gallery-item" style="background-image: url('https://via.placeholder.com/150');"></div>
                <div class="gallery-item" style="background-image: url('https://via.placeholder.com/150');"></div>
            </div>
        </div>
        
        <a href="#" class="button">Дивитися відеопривітання</a>
    </div>
</div>

</body>
</html>
